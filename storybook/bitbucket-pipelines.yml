image: node:22.14.0

pipelines:
  default:
    - step:
        name: Build, linting && tests
        caches:
          - node
        script:
          - npm ci
          - npm run lint
          - npm run test
          - npm run build
  branches:
    master:
      - step:
          name: Build & Test
          caches:
            - node
          artifacts:
            - dist/**
            - README.md
            - storybook-static/**
          script:
            - npm ci
            - npm run lint
            - npm run test
            - npm run build
            - npm run build:storybook
      - step:
          name: Deploy to Storybook to S3
          script:
              - pipe: atlassian/aws-s3-deploy:2.1.0
                variables:
                    AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
                    AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
                    AWS_DEFAULT_REGION: $AWS_DEFAULT_REGION
                    S3_BUCKET: '$AWS_S3_BUCKET/cv-ui-kit-storybook'
                    LOCAL_PATH: 'storybook-static'
                    DELETE_FLAG: 'true'
                    EXTRA_ARGS: '--exclude=.git*'
      - step:
          name: Invalidate Cloudfront Cache
          script:
              - pipe: atlassian/aws-cloudfront-invalidate:0.12.0
                variables:
                    AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
                    AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
                    AWS_DEFAULT_REGION: $AWS_DEFAULT_REGION
                    DISTRIBUTION_ID: $AWS_DISTRIBUTION_ID
      - step:
          name: Package publish
          caches:
            - node
          script:
            - npm ci
            - pipe: atlassian/npm-publish:1.1.1
              variables:
                NPM_TOKEN: $NPM_TOKEN
                NEXUS_AUTH_TOKEN: $NEXUS_AUTH_TOKEN
                NPM_REGISTRY_AUTH_URL: 'http://nexus.1eres.net:8081/repository/npm-leadtech-private/'
